# =============================================================================
# Test Profile — H2 in-memory database (no external dependencies needed)
# =============================================================================

spring.application.name=ms-core-account-movement

# Disable gRPC server during tests
grpc.server.port=-1

# --- Default DataSource (required by Spring Boot auto-config) ---
spring.datasource.url=jdbc:h2:mem:testdb_default;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# --- Account DataSource (Primary, used by AccountDbConfig) ---
spring.datasource.account.jdbc-url=jdbc:h2:mem:testdb_accounts;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL;NON_KEYWORDS=VALUE
spring.datasource.account.username=sa
spring.datasource.account.password=
spring.datasource.account.driver-class-name=org.h2.Driver

# --- Movement DataSource (used by MovementDbConfig) ---
spring.datasource.movement.jdbc-url=jdbc:h2:mem:testdb_movements;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL;NON_KEYWORDS=VALUE
spring.datasource.movement.username=sa
spring.datasource.movement.password=
spring.datasource.movement.driver-class-name=org.h2.Driver

# --- Schema Init ---
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema-h2.sql

# --- JPA ---
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.globally_quoted_identifiers=true

# --- Kafka (point to a dummy broker; KafkaTemplate will be created but won't connect until used) ---
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.properties.max.block.ms=1000
spring.kafka.consumer.auto-offset-reset=earliest

# --- Logging ---
logging.level.org.hibernate.SQL=DEBUG
