<h2 mat-dialog-title>Nuevo Movimiento</h2>
<mat-dialog-content>
  <form [formGroup]="transactionForm" class="dialog-form" style="display: flex; flex-direction: column; gap: 1rem; padding-top: 1rem;">
    
    <mat-form-field appearance="outline">
      <mat-label>Seleccionar Cuenta</mat-label>
      <mat-select formControlName="accountId">
        <mat-option *ngFor="let account of accounts" [value]="account.accountId">
          {{ account.accountNumber }} - {{ account.accountType }} ({{ isAdmin ? account.clientName : 'Mi cuenta' }})
        </mat-option>
      </mat-select>
      <mat-error *ngIf="transactionForm.get('accountId')?.hasError('required')">
        Debe seleccionar una cuenta
      </mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Tipo de Movimiento</mat-label>
      <mat-select formControlName="movementType">
        <mat-option value="Deposito">Depósito</mat-option>
        <mat-option value="Retiro">Retiro</mat-option>
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Valor</mat-label>
      <input matInput type="number" formControlName="value" placeholder="Ej: 50.00" />
      <mat-error *ngIf="transactionForm.get('value')?.hasError('required')">
        El valor es requerido
      </mat-error>
      <mat-error *ngIf="transactionForm.get('value')?.hasError('min')">
        El valor debe ser mayor a 0
      </mat-error>
    </mat-form-field>

  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="onCancel()" [disabled]="isLoading">Cancelar</button>
  <button mat-raised-button color="accent" style="background-color: var(--secondary-color); color: white;" 
          (click)="onSubmit()" [disabled]="transactionForm.invalid || isLoading">
    <mat-icon *ngIf="!isLoading">save</mat-icon>
    <mat-spinner diameter="20" *ngIf="isLoading" style="display:inline-block; margin-right: 8px;"></mat-spinner>
    Guardar
  </button>
</mat-dialog-actions>
