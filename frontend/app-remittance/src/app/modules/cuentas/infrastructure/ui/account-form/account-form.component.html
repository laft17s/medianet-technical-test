<h2 mat-dialog-title>Nueva Cuenta</h2>
<mat-dialog-content>
  <form [formGroup]="accountForm" class="dialog-form" style="display: flex; flex-direction: column; gap: 1rem; padding-top: 1rem;">
    
    <mat-form-field appearance="outline" *ngIf="isAdmin">
      <mat-label>Seleccionar Cliente</mat-label>
      <mat-select formControlName="clientId">
        <mat-option *ngFor="let client of clients" [value]="client.clientId">
          {{ client.name }} ({{ client.identification }})
        </mat-option>
      </mat-select>
      <mat-error *ngIf="accountForm.get('clientId')?.hasError('required')">
        Debe seleccionar un cliente
      </mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Número de Cuenta</mat-label>
      <input matInput formControlName="accountNumber" placeholder="Ej: 123456" (input)="onAccountNumberInput($event)" />
      <mat-error *ngIf="accountForm.get('accountNumber')?.hasError('required')">
        El número de cuenta es requerido
      </mat-error>
      <mat-error *ngIf="accountForm.get('accountNumber')?.hasError('minlength')">
        Mínimo 6 caracteres
      </mat-error>
      <mat-error *ngIf="accountForm.get('accountNumber')?.hasError('pattern')">
        Solo se permiten números y letras mayúsculas
      </mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Tipo de Cuenta</mat-label>
      <mat-select formControlName="accountType">
        <mat-option value="Ahorros">Ahorros</mat-option>
        <mat-option value="Corriente">Corriente</mat-option>
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Saldo Inicial</mat-label>
      <input matInput type="number" formControlName="initialBalance" placeholder="Ej: 100.00" />
      <mat-error *ngIf="accountForm.get('initialBalance')?.hasError('min')">
        No puede ser negativo
      </mat-error>
    </mat-form-field>

  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="onCancel()" [disabled]="isLoading">Cancelar</button>
  <button mat-raised-button color="accent" style="background-color: var(--secondary-color); color: white;" 
          (click)="onSubmit()" [disabled]="accountForm.invalid || isLoading">
    <mat-icon *ngIf="!isLoading">save</mat-icon>
    <mat-spinner diameter="20" *ngIf="isLoading" style="display:inline-block; margin-right: 8px;"></mat-spinner>
    Guardar
  </button>
</mat-dialog-actions>
